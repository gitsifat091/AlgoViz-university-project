<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoViz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a1628; color: #fff; min-height: 100vh; }
        nav { background: #0f2040; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #00c8ff; }
        nav .logo { font-size: 24px; font-weight: bold; color: #00c8ff; }
        nav a { color: #ccc; text-decoration: none; margin-left: 20px; }
        nav a:hover { color: #00c8ff; }
        .container { max-width: 1100px; margin: 0 auto; padding: 30px 20px; }
    </style>
</head>
<body>
    <nav>
        <span class="logo">⚙ AlgoViz</span>
        <div>
            {% if user.is_authenticated %}
                <span>Hello, {{ user.username }} 👋</span>
                <a href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'signup' %}">Sign Up</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
