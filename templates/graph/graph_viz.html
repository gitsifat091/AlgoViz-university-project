{% extends 'base.html' %}
{% block content %}

<!-- Header -->
<div class="fade-up" style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:28px; flex-wrap:wrap; gap:16px;">
  <div>
    <div class="tag tag-cyan" style="margin-bottom:12px;">GRAPH ALGORITHM</div>
    <h1 style="font-family:var(--font-head); font-size:26px; font-weight:900; letter-spacing:2px;">
      {{ algo_emoji }} <span style="color:var(--cyan);" class="glow">{{ algo_full }}</span>
    </h1>
    <p style="color:var(--muted); font-size:12px; margin-top:6px;">{{ algo_desc }}</p>
  </div>
  <a href="{% url 'dashboard' %}" class="btn-ghost" style="font-size:12px;">← BACK</a>
</div>

<!-- Input Form -->
<div class="card fade-up-2" style="margin-bottom:20px;">
  <form method="POST">
    {% csrf_token %}
    <div style="display:grid; grid-template-columns:1fr auto auto; gap:16px; align-items:end; flex-wrap:wrap;">
      <div>
        <label style="display:block; font-size:10px; letter-spacing:2px; color:var(--muted); margin-bottom:8px;">EDGES (e.g. 0-1, 0-2, 1-3)</label>
        <input type="text" name="edges" value="{{ edges_str }}" placeholder="0-1, 0-2, 1-3, 2-4">
      </div>
      <div style="min-width:100px;">
        <label style="display:block; font-size:10px; letter-spacing:2px; color:var(--muted); margin-bottom:8px;">NODES (max 12)</label>
        <input type="number" name="nodes" value="{{ node_count }}" min="2" max="12" style="width:100%;">
      </div>
      <div style="min-width:100px;">
        <label style="display:block; font-size:10px; letter-spacing:2px; color:var(--muted); margin-bottom:8px;">START NODE</label>
        <input type="number" name="start" value="{{ start_node }}" min="0" style="width:100%;">
      </div>
    </div>
    <button type="submit" class="btn-primary" style="margin-top:16px; letter-spacing:2px;">VISUALIZE</button>
  </form>
</div>

<!-- Main Layout: Canvas + Side Panel -->
<div style="display:grid; grid-template-columns:1fr 280px; gap:20px; margin-bottom:20px;" class="fade-up-3">

  <!-- Graph Canvas -->
  <div class="card" style="padding:0; overflow:hidden; position:relative;">
    <div style="padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between;">
      <span style="font-family:var(--font-head); font-size:12px; letter-spacing:2px; color:var(--muted);">GRAPH CANVAS</span>
      <div style="display:flex; gap:16px; font-size:11px;">
        <span><span id="leg-unvisited" style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--border);margin-right:4px;"></span>Unvisited</span>
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--cyan);margin-right:4px;"></span>Current</span>
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--green);margin-right:4px;"></span>Visited</span>
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--orange);margin-right:4px;"></span>Exploring</span>
      </div>
    </div>
    <canvas id="graphCanvas" style="width:100%; display:block;"></canvas>
  </div>

  <!-- Side Panel -->
  <div style="display:flex; flex-direction:column; gap:16px;">

    <!-- Status -->
    <div class="card" style="border-color:rgba(0,229,255,0.2);">
      <div style="font-size:10px; letter-spacing:2px; color:var(--muted); margin-bottom:10px;">STATUS</div>
      <div id="status-text" style="font-size:12px; color:var(--yellow); line-height:1.6; min-height:48px;">Ready to start...</div>
    </div>

    <!-- Data Structure Tracker -->
    <div class="card">
      <div style="font-size:10px; letter-spacing:2px; color:#{{ ds_color }}; margin-bottom:10px;">{{ data_structure }}</div>
      <div id="ds-container" style="min-height:40px; display:flex; flex-wrap:wrap; gap:6px; align-items:center;">
        <span style="color:var(--muted); font-size:12px;">Empty</span>
      </div>
    </div>

    <!-- Visited Order -->
    <div class="card">
      <div style="font-size:10px; letter-spacing:2px; color:var(--green); margin-bottom:10px;">VISITED ORDER</div>
      <div id="visited-order" style="display:flex; flex-wrap:wrap; gap:6px; min-height:30px;">
        <span style="color:var(--muted); font-size:12px;">—</span>
      </div>
    </div>

    <!-- Step Counter -->
    <div class="card" style="text-align:center;">
      <div style="font-size:10px; letter-spacing:2px; color:var(--muted); margin-bottom:8px;">PROGRESS</div>
      <div>
        <span style="font-family:var(--font-head); font-size:28px; color:var(--cyan);" id="step-num">0</span>
        <span style="color:var(--muted); font-size:14px;"> / </span>
        <span style="font-family:var(--font-head); font-size:16px; color:var(--muted);" id="total-steps">0</span>
      </div>
    </div>

  </div>
</div>

<!-- Controls -->
<div class="fade-up-4" style="display:flex; gap:10px; justify-content:center; align-items:center; flex-wrap:wrap; margin-bottom:16px;">
  <button onclick="prevStep()" class="btn-ghost" style="padding:10px 20px;">⏮ PREV</button>
  <button onclick="togglePlay()" id="play-btn" class="btn-primary" style="padding:12px 36px; font-size:15px; letter-spacing:3px;">▶ PLAY</button>
  <button onclick="nextStep()" class="btn-ghost" style="padding:10px 20px;">NEXT ⏭</button>
  <button onclick="resetViz()" class="btn-ghost" style="padding:10px 20px;">↺ RESET</button>
  <div style="display:flex; align-items:center; gap:10px; margin-left:10px;">
    <span style="font-size:10px; color:var(--muted); letter-spacing:2px;">SPEED</span>
    <input type="range" id="speed-slider" min="200" max="1500" value="800"
      style="width:100px; accent-color:var(--cyan);">
  </div>
</div>

<script>
// ── Data ──────────────────────────────────────────────────────
const steps     = {{ steps|safe }};
const edgeList  = {{ edges|safe }};
const nodeCount = {{ node_count }};
const startNode = {{ start_node }};
const dsColor   = '#{{ ds_color }}';
const algoName  = '{{ algo_name }}';

let current = 0, playing = false, timer = null;

// ── Canvas Setup ──────────────────────────────────────────────
const canvas = document.getElementById('graphCanvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width  = rect.width;
  canvas.height = Math.max(380, Math.min(rect.width * 0.6, 480));
  drawStep(steps[current]);
}

// ── Node Positions (circle layout) ────────────────────────────
function getNodePositions() {
  const cx = canvas.width  / 2;
  const cy = canvas.height / 2;
  const r  = Math.min(cx, cy) * 0.72;
  const positions = [];
  for (let i = 0; i < nodeCount; i++) {
    const angle = (2 * Math.PI * i / nodeCount) - Math.PI / 2;
    positions.push({ x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) });
  }
  return positions;
}

// ── Draw ──────────────────────────────────────────────────────
function drawStep(step) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const pos = getNodePositions();
  const nodeR = Math.max(22, Math.min(30, canvas.width / (nodeCount * 2.5)));

  // Draw edges
  edgeList.forEach(([a, b]) => {
    const isExploring = step.exploring_edge &&
      ((step.exploring_edge[0] === a && step.exploring_edge[1] === b) ||
       (step.exploring_edge[0] === b && step.exploring_edge[1] === a));

    const isVisitedEdge = step.visited && step.visited.includes(a) && step.visited.includes(b);

    ctx.beginPath();
    ctx.moveTo(pos[a].x, pos[a].y);
    ctx.lineTo(pos[b].x, pos[b].y);

    if (isExploring) {
      ctx.strokeStyle = '#FF8C42';
      ctx.lineWidth = 3.5;
      ctx.setLineDash([]);
    } else if (isVisitedEdge) {
      ctx.strokeStyle = 'rgba(0,212,160,0.4)';
      ctx.lineWidth = 2;
      ctx.setLineDash([]);
    } else {
      ctx.strokeStyle = '#1A3A5C';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([5, 4]);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // Draw nodes
  for (let i = 0; i < nodeCount; i++) {
    const { x, y } = pos[i];
    const isVisited  = step.visited && step.visited.includes(i);
    const isCurrent  = step.current === i;
    const isExplEdge = step.exploring_edge && step.exploring_edge.includes(i);
    const isStart    = i === startNode;

    // Glow
    if (isCurrent || isExplEdge) {
      ctx.beginPath();
      ctx.arc(x, y, nodeR + 10, 0, Math.PI * 2);
      const grd = ctx.createRadialGradient(x, y, nodeR, x, y, nodeR + 14);
      grd.addColorStop(0, isCurrent ? 'rgba(0,229,255,0.35)' : 'rgba(255,140,66,0.25)');
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.fill();
    }

    // Circle
    ctx.beginPath();
    ctx.arc(x, y, nodeR, 0, Math.PI * 2);

    let fillColor = '#132038';
    let strokeColor = '#1A3A5C';
    let strokeW = 1.5;

    if (step.done)          { fillColor = '#004d30'; strokeColor = '#00D4A0'; strokeW = 2; }
    else if (isCurrent)     { fillColor = '#004a60'; strokeColor = '#00E5FF'; strokeW = 3; }
    else if (isExplEdge)    { fillColor = '#5c3a1a'; strokeColor = '#FF8C42'; strokeW = 2.5; }
    else if (isVisited)     { fillColor = '#003d28'; strokeColor = '#00D4A0'; strokeW = 2; }

    if (isStart && !step.done) { strokeColor = '#FFD166'; strokeW = Math.max(strokeW, 2.5); }

    ctx.fillStyle = fillColor;
    ctx.fill();
    ctx.strokeStyle = strokeColor;
    ctx.lineWidth = strokeW;
    ctx.stroke();

    // Node label
    ctx.fillStyle = isCurrent ? '#00E5FF' : isVisited ? '#00D4A0' : '#8BAABF';
    ctx.font = `bold ${Math.round(nodeR * 0.7)}px "JetBrains Mono", monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(i, x, y);

    // Start marker
    if (isStart) {
      ctx.fillStyle = '#FFD166';
      ctx.font = `${Math.round(nodeR * 0.45)}px sans-serif`;
      ctx.fillText('★', x, y - nodeR - 8);
    }
  }
}

// ── Update Side Panel ─────────────────────────────────────────
let visitedOrder = [];

function updatePanel(step) {
  // Status
  const el = document.getElementById('status-text');
  el.textContent = step.status || '';
  el.style.color = step.done ? '#00D4A0' : step.exploring_edge ? '#FF8C42' : '#FFD166';

  // Data structure (Queue for BFS / Stack for DFS)
  const ds = step.queue || step.stack || [];
  const dsEl = document.getElementById('ds-container');
  if (ds.length === 0) {
    dsEl.innerHTML = '<span style="color:var(--muted);font-size:12px;">Empty</span>';
  } else {
    dsEl.innerHTML = ds.map((n, i) => {
      const isTop = (algoName === 'DFS') ? i === ds.length - 1 : i === 0;
      return `<div style="
        background:${isTop ? dsColor + '33' : '#0d1f38'};
        border:1px solid ${isTop ? dsColor : '#1a3a5c'};
        border-radius:6px; padding:4px 10px;
        font-family:'JetBrains Mono',monospace;
        font-size:13px; font-weight:bold;
        color:${isTop ? dsColor : '#8baabf'};
      ">${n}</div>`;
    }).join('');
  }

  // Visited order
  if (step.current !== null && step.current !== undefined && step.status && step.status.includes('Visit')) {
    if (!visitedOrder.includes(step.current)) visitedOrder.push(step.current);
  }
  if (step.done) visitedOrder = step.visited || visitedOrder;
  if (step.status && step.status.includes('Start')) visitedOrder = [];

  const voEl = document.getElementById('visited-order');
  if (visitedOrder.length === 0) {
    voEl.innerHTML = '<span style="color:var(--muted);font-size:12px;">—</span>';
  } else {
    voEl.innerHTML = visitedOrder.map((n, i) => `
      <div style="display:flex;align-items:center;gap:4px;">
        <div style="background:#003d28;border:1px solid #00D4A0;border-radius:6px;padding:4px 10px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:bold;color:#00D4A0;">${n}</div>
        ${i < visitedOrder.length - 1 ? '<span style="color:#1a3a5c;">→</span>' : ''}
      </div>
    `).join('');
  }

  // Counter
  document.getElementById('step-num').textContent = current;
  document.getElementById('total-steps').textContent = steps.length - 1;
}

// ── Controls ──────────────────────────────────────────────────
function render(step) { drawStep(step); updatePanel(step); }
function getDelay() { return 1700 - parseInt(document.getElementById('speed-slider').value); }

function nextStep() {
  if (current < steps.length - 1) { current++; render(steps[current]); }
  else stopPlay();
}
function prevStep() {
  if (current > 0) { current--; visitedOrder = []; render(steps[current]); }
}
function resetViz() {
  stopPlay(); current = 0; visitedOrder = []; render(steps[0]);
}
function togglePlay() { playing ? stopPlay() : startPlay(); }
function startPlay() {
  playing = true;
  document.getElementById('play-btn').textContent = '⏸ PAUSE';
  timer = setInterval(() => {
    if (current < steps.length - 1) { current++; render(steps[current]); }
    else stopPlay();
  }, getDelay());
}
function stopPlay() {
  playing = false;
  document.getElementById('play-btn').textContent = '▶ PLAY';
  clearInterval(timer);
}

// ── Init ──────────────────────────────────────────────────────
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
render(steps[0]);
</script>
{% endblock %}
