{% extends 'base.html' %}
{% block content %}

<div class="fade-up" style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:28px; flex-wrap:wrap; gap:16px;">
  <div>
    <div class="tag tag-cyan" style="margin-bottom:12px;">GRAPH ALGORITHM</div>
    <h1 style="font-family:var(--font-head); font-size:26px; font-weight:900; letter-spacing:2px;">
      🔄 <span style="color:var(--cyan);" class="glow">FLOYD-WARSHALL</span>
    </h1>
    <p style="color:var(--muted); font-size:12px; margin-top:6px;">{{ algo_desc }}</p>
  </div>
  <a href="{% url 'dashboard' %}" class="btn-ghost" style="font-size:12px;">← BACK</a>
</div>

<!-- Input -->
<div class="card fade-up-2" style="margin-bottom:20px;">
  <form method="POST">
    {% csrf_token %}
    <div style="display:grid; grid-template-columns:1fr auto; gap:16px; align-items:end;">
      <div>
        <label style="display:block; font-size:10px; letter-spacing:2px; color:var(--muted); margin-bottom:8px;">EDGES WITH WEIGHTS — format: a-b:weight (max 8 nodes)</label>
        <input type="text" name="edges" value="{{ edges_str }}">
      </div>
      <div style="min-width:90px;">
        <label style="display:block; font-size:10px; letter-spacing:2px; color:var(--muted); margin-bottom:8px;">NODES (max 8)</label>
        <input type="number" name="nodes" value="{{ node_count }}" min="2" max="8" style="width:100%;">
      </div>
    </div>
    <button type="submit" class="btn-primary" style="margin-top:16px; letter-spacing:2px;">VISUALIZE</button>
  </form>
</div>

<!-- Main layout: Graph + Matrix -->
<div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px;" class="fade-up-3">

  <!-- Graph Canvas -->
  <div class="card" style="padding:0; overflow:hidden;">
    <div style="padding:14px 20px; border-bottom:1px solid var(--border);">
      <span style="font-family:var(--font-head); font-size:11px; letter-spacing:2px; color:var(--muted);">GRAPH</span>
    </div>
    <canvas id="graphCanvas" style="width:100%; display:block;"></canvas>
  </div>

  <!-- Distance Matrix -->
  <div class="card" style="padding:0; overflow:hidden;">
    <div style="padding:14px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
      <span style="font-family:var(--font-head); font-size:11px; letter-spacing:2px; color:var(--muted);">DISTANCE MATRIX</span>
      <span style="font-size:11px; color:var(--muted);">
        k=<strong id="k-val" style="color:var(--yellow);">-</strong>
        &nbsp; i=<strong id="i-val" style="color:var(--cyan);">-</strong>
        &nbsp; j=<strong id="j-val" style="color:var(--green);">-</strong>
      </span>
    </div>
    <div style="padding:16px; overflow-x:auto;">
      <div id="matrix-container"></div>
    </div>
  </div>

</div>

<!-- Status + Progress -->
<div style="display:grid; grid-template-columns:1fr auto; gap:16px; margin-bottom:20px; align-items:center;" class="fade-up-3">
  <div class="card" style="border-color:rgba(0,229,255,0.2); padding:16px 20px;">
    <div style="font-size:10px; letter-spacing:2px; color:var(--muted); margin-bottom:6px;">STATUS</div>
    <div id="status-text" style="font-size:12px; color:var(--yellow); line-height:1.6;">Ready...</div>
  </div>
  <div class="card" style="text-align:center; padding:16px 24px; min-width:140px;">
    <div style="font-size:10px; letter-spacing:2px; color:var(--muted); margin-bottom:6px;">PROGRESS</div>
    <span style="font-family:var(--font-head); font-size:24px; color:var(--cyan);" id="step-num">0</span>
    <span style="color:var(--muted);"> / </span>
    <span style="font-family:var(--font-head); font-size:14px; color:var(--muted);" id="total-steps">0</span>
  </div>
</div>

<!-- Controls -->
<div class="fade-up-4" style="display:flex; gap:10px; justify-content:center; align-items:center; flex-wrap:wrap;">
  <button onclick="prevStep()" class="btn-ghost" style="padding:10px 20px;">⏮ PREV</button>
  <button onclick="togglePlay()" id="play-btn" class="btn-primary" style="padding:12px 36px; font-size:15px; letter-spacing:3px;">▶ PLAY</button>
  <button onclick="nextStep()" class="btn-ghost" style="padding:10px 20px;">NEXT ⏭</button>
  <button onclick="resetViz()" class="btn-ghost" style="padding:10px 20px;">↺ RESET</button>
  <div style="display:flex; align-items:center; gap:10px; margin-left:10px;">
    <span style="font-size:10px; color:var(--muted); letter-spacing:2px;">SPEED</span>
    <input type="range" id="speed-slider" min="200" max="1500" value="700"
      style="width:100px; accent-color:var(--cyan);">
  </div>
</div>

<script>
const steps     = {{ steps|safe }};
const edgeList  = {{ edges|safe }};
const nodeCount = {{ node_count }};

let current = 0, playing = false, timer = null;

// ── Canvas ────────────────────────────────────────────────────
const canvas = document.getElementById('graphCanvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width  = rect.width;
  canvas.height = Math.max(300, Math.min(rect.width * 0.85, 400));
  drawGraph(steps[current]);
}

function getNodePositions() {
  const cx=canvas.width/2, cy=canvas.height/2;
  const r=Math.min(cx,cy)*0.72;
  return Array.from({length:nodeCount},(_,i)=>{
    const angle=(2*Math.PI*i/nodeCount)-Math.PI/2;
    return {x:cx+r*Math.cos(angle), y:cy+r*Math.sin(angle)};
  });
}

function drawGraph(step) {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const pos=getNodePositions();
  const nodeR=Math.max(20,Math.min(26,canvas.width/(nodeCount*2.8)));

  edgeList.forEach(([a,b,w])=>{
    const isCur = step.current_edge &&
      ((step.current_edge[0]===a&&step.current_edge[1]===b)||
       (step.current_edge[0]===b&&step.current_edge[1]===a));
    const isRel = step.relaxed &&
      ((step.relaxed[0]===a&&step.relaxed[1]===b)||
       (step.relaxed[0]===b&&step.relaxed[1]===a));
    const isK   = step.k===a||step.k===b;

    ctx.beginPath();
    ctx.moveTo(pos[a].x,pos[a].y);
    ctx.lineTo(pos[b].x,pos[b].y);
    ctx.setLineDash([]);
    if (isRel)       { ctx.strokeStyle='#a855f7'; ctx.lineWidth=3.5; }
    else if (isCur)  { ctx.strokeStyle='#00E5FF'; ctx.lineWidth=3; }
    else if (isK)    { ctx.strokeStyle='rgba(255,209,102,0.4)'; ctx.lineWidth=2; }
    else             { ctx.strokeStyle='#1A3A5C'; ctx.lineWidth=1.5; ctx.setLineDash([5,4]); }
    ctx.stroke(); ctx.setLineDash([]);

    const mx=(pos[a].x+pos[b].x)/2, my=(pos[a].y+pos[b].y)/2;
    ctx.fillStyle='#0a1628';
    ctx.beginPath(); ctx.arc(mx,my,11,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=isRel?'#a855f7':isCur?'#00E5FF':'#3a6080';
    ctx.font='bold 11px "JetBrains Mono",monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(w,mx,my);
  });

  for (let i=0;i<nodeCount;i++) {
    const {x,y}=pos[i];
    const isK   = step.k===i;
    const isI   = step.i===i;
    const isJ   = step.j===i;
    const isRel = step.relaxed&&step.relaxed.includes(i);

    if (isK||isI||isJ||isRel) {
      ctx.beginPath(); ctx.arc(x,y,nodeR+11,0,Math.PI*2);
      const grd=ctx.createRadialGradient(x,y,nodeR,x,y,nodeR+14);
      grd.addColorStop(0,isRel?'rgba(168,85,247,0.4)':isK?'rgba(255,209,102,0.35)':'rgba(0,229,255,0.3)');
      grd.addColorStop(1,'transparent');
      ctx.fillStyle=grd; ctx.fill();
    }

    ctx.beginPath(); ctx.arc(x,y,nodeR,0,Math.PI*2);
    let fill='#0d1f38', stroke='#1a3a5c', sw=1.5;
    if (step.done)   { fill='#004d30'; stroke='#00D4A0'; sw=2.5; }
    else if (isRel)  { fill='#2d1b4e'; stroke='#a855f7'; sw=2.5; }
    else if (isK)    { fill='#3d3000'; stroke='#FFD166'; sw=3; }
    else if (isI||isJ) { fill='#003d55'; stroke='#00E5FF'; sw=2.5; }
    ctx.fillStyle=fill; ctx.fill();
    ctx.strokeStyle=stroke; ctx.lineWidth=sw; ctx.stroke();

    ctx.fillStyle=isRel?'#a855f7':isK?'#FFD166':(isI||isJ)?'#00E5FF':step.done?'#00D4A0':'#8BAABF';
    ctx.font=`bold ${Math.round(nodeR*0.65)}px "JetBrains Mono",monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(i,x,y);

    // K label
    if (isK && !step.done) {
      ctx.fillStyle='#FFD166';
      ctx.font=`bold 10px "JetBrains Mono",monospace`;
      ctx.fillText('k',x,y-nodeR-9);
    }
  }
}

// ── Matrix ────────────────────────────────────────────────────
function renderMatrix(step) {
  const mc = document.getElementById('matrix-container');
  const m  = step.matrix;
  const cellSize = Math.min(44, Math.floor(480/nodeCount));

  let html = `<table style="border-collapse:collapse; font-family:'JetBrains Mono',monospace; font-size:${Math.min(13,cellSize*0.3)}px;">`;

  // Header row
  html += '<tr><td style="width:'+cellSize+'px;height:'+cellSize+'px;"></td>';
  for (let j=0;j<nodeCount;j++) {
    const isJ = step.j===j;
    html += `<td style="width:${cellSize}px;height:${cellSize*0.7}px;text-align:center;
      color:${isJ?'#00E5FF':'#3a6080'};font-weight:bold;font-size:11px;">
      ${j}</td>`;
  }
  html += '</tr>';

  // Data rows
  for (let i=0;i<nodeCount;i++) {
    const isI = step.i===i;
    html += `<tr><td style="width:${cellSize*0.7}px;text-align:center;
      color:${isI?'#00E5FF':'#3a6080'};font-weight:bold;font-size:11px;">
      ${i}</td>`;
    for (let j=0;j<nodeCount;j++) {
      const val = m[i][j];
      const isRelaxed  = step.relaxed  && step.relaxed[0]===i  && step.relaxed[1]===j;
      const isCurIJ    = step.current_edge && step.current_edge[0]===i && step.current_edge[1]===j;
      const isKRow     = step.k===i||step.k===j;
      const isDiag     = i===j;

      let bg='#0d1f38', color='#5a7a99', bord='#1a3a5c';
      if (isDiag)       { bg='#0a1628'; color='#3a5a70'; }
      if (isKRow)       { bg='#1a1200'; color='#806020'; bord='#403010'; }
      if (isCurIJ)      { bg='#003d55'; color='#00E5FF'; bord='#00E5FF'; }
      if (isRelaxed)    { bg='#2d1b4e'; color='#a855f7'; bord='#a855f7'; }
      if (step.done && val!==-1 && !isDiag) { bg='#003d28'; color='#00D4A0'; bord='#00D4A0'; }

      html += `<td style="
        width:${cellSize}px; height:${cellSize}px;
        text-align:center; vertical-align:middle;
        background:${bg}; color:${color};
        border:1px solid ${bord};
        border-radius:4px; font-weight:bold;
        transition: background 0.2s, color 0.2s;
      ">${val===-1?'∞':val}</td>`;
    }
    html += '</tr>';
  }
  html += '</table>';
  mc.innerHTML = html;
}

function updatePanel(step) {
  const el=document.getElementById('status-text');
  el.textContent=step.status||'';
  el.style.color=step.done?'#00D4A0':step.relaxed?'#a855f7':step.current_edge?'#00E5FF':'#FFD166';

  document.getElementById('k-val').textContent = step.k>=0?step.k:'-';
  document.getElementById('i-val').textContent = step.i>=0?step.i:'-';
  document.getElementById('j-val').textContent = step.j>=0?step.j:'-';
  document.getElementById('step-num').textContent    = current;
  document.getElementById('total-steps').textContent = steps.length-1;
}

function render(step) { drawGraph(step); renderMatrix(step); updatePanel(step); }
function getDelay() { return 1700-parseInt(document.getElementById('speed-slider').value); }
function nextStep() { if(current<steps.length-1){current++;render(steps[current]);}else stopPlay(); }
function prevStep() { if(current>0){current--;render(steps[current]);} }
function resetViz() { stopPlay();current=0;render(steps[0]); }
function togglePlay() { playing?stopPlay():startPlay(); }
function startPlay() {
  playing=true; document.getElementById('play-btn').textContent='⏸ PAUSE';
  timer=setInterval(()=>{if(current<steps.length-1){current++;render(steps[current]);}else stopPlay();},getDelay());
}
function stopPlay() {
  playing=false; document.getElementById('play-btn').textContent='▶ PLAY'; clearInterval(timer);
}

window.addEventListener('resize',resizeCanvas);
resizeCanvas(); render(steps[0]);
</script>
{% endblock %}
